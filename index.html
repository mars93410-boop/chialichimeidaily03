<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>佳里奇美醫院外科部｜醫療團隊排班總覽</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260602-duty-blank-option" />
  </head>
  <body>
    <main class="schedule-shell">
      <section class="hero">
        <div class="hero-copy">
          <p class="hospital-name">佳里奇美醫院外科部</p>
          <h1>醫療團隊排班總覽</h1>
        </div>
        <a class="site-qr" href="https://chialichimei.vercel.app/" target="_blank" rel="noopener" aria-label="開啟排班網站">
          <img src="./assets/site-qr.svg" alt="排班網站 QR code" />
        </a>
        <div class="mode-toolbar" aria-live="polite">
          <span class="mode-badge" id="modeStatus">檢視模式</span>
          <span class="sync-badge" id="syncStatus">本機資料</span>
          <button class="edit-mode-button" type="button" id="editModeToggle" aria-pressed="false">
            <i data-lucide="lock-keyhole"></i>
            <span>修改模式</span>
          </button>
        </div>
      </section>

      <section class="board" aria-label="醫療團隊排班總覽">
        <div class="date-switcher" aria-label="日期切換">
          <button class="round-button" type="button" id="prevDay" aria-label="前一天">
            <i data-lucide="chevron-left"></i>
          </button>
          <button
            class="date-display"
            type="button"
            id="datePickerToggle"
            aria-expanded="false"
            aria-controls="calendarPanel"
          >
            <i data-lucide="calendar-days"></i>
            <span id="currentDate">5/31</span>
          </button>
          <button class="round-button" type="button" id="nextDay" aria-label="後一天">
            <i data-lucide="chevron-right"></i>
          </button>

          <div class="calendar-popover" id="calendarPanel" hidden>
            <div class="calendar-head">
              <button class="calendar-nav" type="button" id="prevMonth" aria-label="上個月">
                <i data-lucide="chevron-left"></i>
              </button>
              <strong id="calendarMonth"></strong>
              <button class="calendar-nav" type="button" id="nextMonth" aria-label="下個月">
                <i data-lucide="chevron-right"></i>
              </button>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>日</span>
              <span>一</span>
              <span>二</span>
              <span>三</span>
              <span>四</span>
              <span>五</span>
              <span>六</span>
            </div>
            <div class="calendar-grid" id="calendarGrid" role="grid" aria-label="選擇日期"></div>
          </div>
        </div>

        <section class="area-grid" id="areaGrid" aria-label="分區排班"></section>

        <div class="area-actions" id="areaActions" hidden>
          <button class="ditto-day-button" type="button" id="dittoPreviousDay">
            <i data-lucide="copy-plus"></i>
            <span>Ditto 前一日</span>
          </button>
        </div>

        <section class="status-section">
          <div class="section-title">
            <span class="title-icon duty"><i data-lucide="user-round-check"></i></span>
            <h2>值班醫師/專師</h2>
          </div>
          <div class="status-grid" id="dutyGrid"></div>
        </section>

        <section class="status-section leave-section">
          <div class="section-title">
            <span class="title-icon leave"><i data-lucide="user-round-minus"></i></span>
            <h2>請假醫師</h2>
          </div>
          <div class="leave-list" id="leaveList"></div>
        </section>
      </section>
    </main>

    <div class="name-picker-backdrop" id="namePicker" hidden>
      <section class="name-picker" role="dialog" aria-modal="true" aria-labelledby="namePickerTitle">
        <div class="name-picker-head">
          <h2 id="namePickerTitle">選擇人員</h2>
          <button class="name-picker-close" type="button" id="namePickerClose" aria-label="關閉">
            <i data-lucide="x"></i>
          </button>
        </div>
        <div class="name-picker-list" id="namePickerList"></div>
      </section>
    </div>

    <div class="auth-backdrop" id="authDialog" hidden>
      <section class="auth-panel" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <div class="name-picker-head">
          <h2 id="authTitle">修改權限</h2>
          <button class="name-picker-close" type="button" id="authCancelButton" aria-label="關閉">
            <i data-lucide="x"></i>
          </button>
        </div>
        <form class="auth-form" id="authForm">
          <label>
            <span>修改密碼</span>
            <input type="password" id="authPassword" autocomplete="current-password" required />
          </label>
          <p class="auth-message" id="authMessage" role="alert"></p>
          <button class="auth-submit-button" type="submit">
            <i data-lucide="key-round"></i>
            <span>進入修改模式</span>
          </button>
        </form>
      </section>
    </div>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js?v=20260531-supabase-configured"></script>
    <script src="./script.js?v=20260602-password-0000"></script>
  </body>
</html>
